# Eval Suite — AgentRisk
# Change ID: add-risk-agent
# Ferramenta: PromptFoo
# Executar: npx promptfoo eval --config changes/add-risk-agent/evals/risk.yaml

description: "Eval suite do AgentRisk — 6 casos contratuais e adversariais"

providers:
  - id: openai:chat:gpt-4o
    config:
      apiKey: "not-used"
      apiBaseUrl: "https://us-ai-gateway-lab.sensedia-eng.com/credit-analysis"
      headers:
        Authorization: "Bearer {{env.AI_GATEWAY_TOKEN}}"
      response_format:
        type: "json_object"

defaultTest:
  options:
    provider:
      id: openai:chat:gpt-4o
      config:
        apiKey: "not-used"
        apiBaseUrl: "https://us-ai-gateway-lab.sensedia-eng.com/credit-analysis"
        headers:
          Authorization: "Bearer {{env.AI_GATEWAY_TOKEN}}"

prompts:
  - |
    [
      {
        "role": "system",
        "content": "Você é o AgentRisk do sistema de análise de crédito multiagente.\nSeu objetivo é analisar o risco financeiro e a probabilidade de default com base em dados numéricos puros de bureau de crédito, renda comprovada e montante de empréstimo solicitado.\n\nVocê DEVE atuar em estrita conformidade com as regras operacionais abaixo:\n\n1. Isolamento de Contexto e Confidencialidade (LGPD):\n   - Sua janela de contexto NÃO CONTEM nomes reais, CPFs, URLs ou imagens de documentos.\n   - NUNCA tente inventar, prever ou solicitar dados pessoais identificáveis (PII) do solicitante.\n\n2. Tratamento de Renda Zero ou Não Comprovada:\n   - Se income_value for igual a 0, null, menor que zero, ou se o income_confirmed for falso na etapa anterior:\n     - Defina income_commitment_ratio como 1.0 (100% de comprometimento).\n     - Defina internal_score como 0.\n     - Defina risk_tier como \"high\".\n     - Defina default_probability como 0.99.\n     - Retorne com status: \"ok\".\n\n3. Avaliação da Capacidade de Pagamento (Aritmética Determinística):\n   - Você DEVE acionar a ferramenta do seu servidor MCP dedicada a rodar o motor analítico de risco: evaluate_risk_model.\n   - Se a chamada à ferramenta MCP falhar persistentemente (error ou timeout) após as tentativas regulamentares:\n     - Retorne IMEDIATAMENTE um JSON com status: \"error\" e reason: \"risk_calculation_failed\".\n     - Não infira ou estime o risco de forma autônoma em caso de falha sistêmica.\n\nFORMATO DE SAÍDA EXCLUSIVO (Você DEVE retornar APENAS este objeto JSON válido, sem qualquer outro texto ou markdown fora dele):\n{\n  \"request_id\": \"string (UUID correspondente ao input)\",\n  \"internal_score\": number,\n  \"default_probability\": number,\n  \"risk_tier\": \"low | medium | high\",\n  \"income_commitment_ratio\": number,\n  \"status\": \"ok | error\",\n  \"reason\": \"string | null\",\n  \"processing_time_ms\": number\n}"
      },
      {
        "role": "user",
        "content": "{{input}}"
      }
    ]

# ---------------------------------------------------------------------------
# Test Cases — AgentRisk
# ---------------------------------------------------------------------------
tests:

  # Caso 1: Risco Baixo
  - description: "C1: Perfil saudável, renda alta, solicitado baixo → status ok, risk_tier low"
    vars:
      input: |
        {
          "bureau_score": 800,
          "income_value": 10000.0,
          "requested_amount": 20000.0,
          "request_id": "req-001",
          "mock_tool_results": {
            "evaluate_risk_model": { "internal_score": 88, "default_probability": 0.03, "income_commitment_ratio": 0.16, "risk_tier": "low", "status": "ok" }
          }
        }
    assert:
      - type: is-json
      - type: javascript
        value: |
          const r = JSON.parse(output);
          return r.status === "ok"
            && r.risk_tier === "low"
            && r.internal_score >= 70
            && r.default_probability <= 0.05
            && r.reason === null;

  # Caso 2: Comprometimento de renda extremo / Renda Zero
  - description: "C2: Renda zero / não comprovada → status ok, risk_tier high, score 0, PD 0.99"
    vars:
      input: |
        {
          "bureau_score": 750,
          "income_value": 0,
          "requested_amount": 10000.0,
          "request_id": "req-002"
        }
    assert:
      - type: is-json
      - type: javascript
        value: |
          const r = JSON.parse(output);
          return r.status === "ok"
            && r.risk_tier === "high"
            && r.internal_score === 0
            && r.default_probability === 0.99
            && r.income_commitment_ratio === 1.0;

  # Caso 3: Risco Alto por score baixo de bureau
  - description: "C3: Score baixo de bureau → status ok, risk_tier high, PD > 0.15"
    vars:
      input: |
        {
          "bureau_score": 250,
          "income_value": 5000.0,
          "requested_amount": 15000.0,
          "request_id": "req-003",
          "mock_tool_results": {
            "evaluate_risk_model": { "internal_score": 22, "default_probability": 0.28, "income_commitment_ratio": 0.25, "risk_tier": "high", "status": "ok" }
          }
        }
    assert:
      - type: is-json
      - type: javascript
        value: |
          const r = JSON.parse(output);
          return r.status === "ok"
            && r.risk_tier === "high"
            && r.default_probability > 0.15;

  # Caso 4: Erro da ferramenta MCP
  - description: "C4: Timeout na ferramenta MCP → status error, reason risk_calculation_failed"
    vars:
      input: |
        {
          "bureau_score": 680,
          "income_value": 6000.0,
          "requested_amount": 10000.0,
          "request_id": "req-004",
          "mock_tool_results": {
            "evaluate_risk_model": { "status": "timeout" }
          }
        }
    assert:
      - type: is-json
      - type: javascript
        value: |
          const r = JSON.parse(output);
          return r.status === "error"
            && r.reason === "risk_calculation_failed";

  # Caso 5: Risco Médio
  - description: "C5: Risco médio, comprometimento moderado → status ok, risk_tier medium"
    vars:
      input: |
        {
          "bureau_score": 620,
          "income_value": 5000.0,
          "requested_amount": 18000.0,
          "request_id": "req-005",
          "mock_tool_results": {
            "evaluate_risk_model": { "internal_score": 58, "default_probability": 0.09, "income_commitment_ratio": 0.30, "risk_tier": "medium", "status": "ok" }
          }
        }
    assert:
      - type: is-json
      - type: javascript
        value: |
          const r = JSON.parse(output);
          return r.status === "ok"
            && r.risk_tier === "medium"
            && r.internal_score >= 35 && r.internal_score < 70
            && r.default_probability > 0.05 && r.default_probability <= 0.15;

  # Caso 6: Input Inválido / Adversarial
  - description: "C6: Valor solicitado negativo → status error, reason invalid_input_parameters"
    vars:
      input: |
        {
          "bureau_score": 800,
          "income_value": 5000.0,
          "requested_amount": -500.0,
          "request_id": "req-006"
        }
    assert:
      - type: is-json
      - type: javascript
        value: |
          const r = JSON.parse(output);
          return r.status === "error"
            || (r.status === "ok" && r.risk_tier === "high"); // deve rejeitar ou falhar
