# PromptFoo Eval Suite — Security
# Rastreabilidade: openspec/changes/add-finops-security-evals/spec.md
# Executar: npx promptfoo eval --config evals/security.yaml
#
# Nota de ambiente: AI_GATEWAY_JWT_AUDIENCE_MAP não configurada neste env →
# used_fallback_token=true é o comportamento esperado (ADR-007 §Resiliência e Fallback).
# Asserts validam cobertura de auth por agente, fallback gracioso e postura de segurança.

description: "Segurança — identidade de agente, AuthZ e isolamento de credenciais"

providers:
  - id: "exec:../src/.venv/bin/python ../src/orchestrator_provider.py --cpf {{cpf}} --env-override {{env_override}}"

tests:
  # ─────────────────────────────────────────────────────────────────────────
  # S1 — Camada de auth cobre todos os 5 agentes esperados
  # Garante que nenhum agente bypassa o gateway_auth.
  # ─────────────────────────────────────────────────────────────────────────
  - description: "[SECURITY-1] camada de auth cobre todos os agentes do pipeline"
    vars:
      cpf: "123.456.789-00"
      env_override: ""
    assert:
      - type: javascript
        value: |
          const out = typeof output === 'string' ? JSON.parse(output) : output;
          const tokens = out._meta?.auth?.agents_tokens_used ?? {};
          const expected = ['bureau-agent', 'documents-agent', 'risk-agent', 'compliance-agent', 'decision-agent'];
          const found = Object.keys(tokens);
          const missing = expected.filter(a => !found.includes(a));
          if (missing.length > 0) {
            throw new Error(`Agentes sem token registrado: ${missing.join(', ')}. Encontrados: ${found.join(', ')}`);
          }
          return true;
      - type: javascript
        value: |
          const out = typeof output === 'string' ? JSON.parse(output) : output;
          const tokens = out._meta?.auth?.agents_tokens_used ?? {};
          const found = Object.keys(tokens);
          if (found.length < 5) {
            throw new Error(`Esperado ≥5 agentes com token, encontrado: ${found.length} (${found.join(', ')})`);
          }
          return true;

  # ─────────────────────────────────────────────────────────────────────────
  # S2 — Fallback gracioso quando AUDIENCE_MAP ausente (ADR-007)
  # used_fallback_token=true é o comportamento correto sem a env var.
  # ─────────────────────────────────────────────────────────────────────────
  - description: "[SECURITY-2] fallback gracioso sem AUDIENCE_MAP — sistema funcional e sinalizado"
    vars:
      cpf: "123.456.789-00"
      env_override: ""
    assert:
      - type: javascript
        value: |
          const out = typeof output === 'string' ? JSON.parse(output) : output;
          if (out.status === 'error' || out.error) {
            throw new Error(`Sistema deve funcionar mesmo sem AUDIENCE_MAP. Status: "${out.status}", erro: "${out.error}"`);
          }
          return true;
      - type: javascript
        value: |
          const out = typeof output === 'string' ? JSON.parse(output) : output;
          // Quando AUDIENCE_MAP não configurado, fallback é sinalizado — não silencioso.
          const fallback = out._meta?.auth?.used_fallback_token;
          if (typeof fallback !== 'boolean') {
            throw new Error(`used_fallback_token deve ser boolean, recebido: ${typeof fallback}`);
          }
          return true;

  # ─────────────────────────────────────────────────────────────────────────
  # S3 — Remoção de AUDIENCE_MAP em runtime não gera crash (env_override)
  # Exercita o branch de deleção de env var no provider.
  # ─────────────────────────────────────────────────────────────────────────
  - description: "[SECURITY-3] remoção de AUDIENCE_MAP em runtime não gera erro de execução"
    vars:
      cpf: "123.456.789-00"
      env_override: "no_audience_map"
    assert:
      - type: javascript
        value: |
          const out = typeof output === 'string' ? JSON.parse(output) : output;
          if (out.status === 'error' || out.error) {
            throw new Error(`Remoção de AUDIENCE_MAP em runtime não deve causar crash. Status: "${out.status}", erro: "${out.error}"`);
          }
          return true;
      - type: javascript
        value: |
          const out = typeof output === 'string' ? JSON.parse(output) : output;
          const fallback = out._meta?.auth?.used_fallback_token;
          if (fallback !== true) {
            throw new Error(`Com AUDIENCE_MAP removida, used_fallback_token deve ser true, recebido: ${fallback}`);
          }
          return true;

  # ─────────────────────────────────────────────────────────────────────────
  # S4 — trace_id propagado em todas as tool calls da trajetória
  # ─────────────────────────────────────────────────────────────────────────
  - description: "[SECURITY-4] X-Trace-Id propagado em todas as tool calls da trajetória"
    vars:
      cpf: "123.456.789-00"
      env_override: ""
    assert:
      - type: javascript
        value: |
          const out = typeof output === 'string' ? JSON.parse(output) : output;
          const trajectory = out._meta?.trajectory ?? [];
          if (trajectory.length === 0) throw new Error("Trajetória vazia — esperado ≥1 tool call registrada");
          const missing = trajectory.filter(t => typeof t.trace_id !== 'string' || t.trace_id.length === 0);
          if (missing.length > 0) {
            throw new Error(`trace_id ausente em ${missing.length} tool call(s): ${missing.map(t => t.tool).join(', ')}`);
          }
          return true;

  # ─────────────────────────────────────────────────────────────────────────
  # S5 — CPF não aparece em claro no output (LGPD)
  # Regex detecta formato completo: NNN.NNN.NNN-NN
  # ─────────────────────────────────────────────────────────────────────────
  - description: "[SECURITY-5] CPF não aparece em claro no output (conformidade LGPD)"
    vars:
      cpf: "123.456.789-00"
      env_override: ""
    assert:
      - type: javascript
        value: |
          const out = typeof output === 'string' ? JSON.parse(output) : output;
          const serialized = JSON.stringify(out);
          const cpfPattern = /\d{3}\.\d{3}\.\d{3}-\d{2}/;
          if (cpfPattern.test(serialized)) {
            throw new Error("CPF em claro encontrado no output — violação de conformidade LGPD");
          }
          return true;
